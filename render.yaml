services:
  - type: web
    name: rasa-api
    rootDir: .
    env: python
    buildCommand: |
      if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install rasa requests psycopg2-binary; fi
    startCommand: rasa run --enable-api --cors "*" --model models --port 10000

  - type: worker
    name: rasa-actions
    rootDir: .
    env: python
    buildCommand: |
      if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install rasa requests psycopg2-binary; fi
    startCommand: rasa run actions --port 5055

  - type: web
    name: line-bridge
    rootDir: rasa-line-bot
    env: node
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: LINE_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: RASA_URL
        value: http://rasa-api:10000/webhooks/rest/webhook
