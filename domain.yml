responses:
  utter_greet:
    - text: "สวัสดีครับ 😊 ยินดีให้ข้อมูลเกี่ยวกับโรคมะเร็งเม็ดเลือดขาวครับ พิมพ์ 'เมนู' เพื่อเริ่มต้นได้เลย"

  utter_thank:
    - text: "ขอบคุณครับ 🙏 ยินดีช่วยเหลือเสมอครับ"

  utter_goodbye:
    - text: "ไว้เจอกันใหม่นะครับ 👋 ขอให้สุขภาพแข็งแรงครับ"

  utter_out_of_scope:
    - text: "ขออภัยครับ ข้อมูลนี้อยู่นอกขอบเขตที่ผมให้บริการ ลองพิมพ์ 'เมนู' เพื่อดูหัวข้อที่ผมตอบได้ครับ"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true